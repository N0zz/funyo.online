<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Meadow Flyer</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#8fd3a6">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meadow Flyer">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="../../analytics.js" defer></script>
<link rel="stylesheet" href="../../game-kit.css">
<script src="../../version.js"></script>
<script src="../../challenges.js"></script>
<script src="../../game-kit.js"></script>
<style>
  :root { --sky:#b8e4f9; --grass:#7ec850; --stem:#5a9e30; --petal:#f9c0c0; --cream:#fdf6e3; --ink:#3a2a17; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--sky); color:var(--ink);
    font-family: Georgia, "Times New Roman", serif; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; }
  /* HUD is positioned center-top by the shared kit (.gamekit-hud), which is a DARK pill with
     light text. Keep the text light in BOTH day & night so it reads on that pill (no day/night
     colour overrides) — only size/weight live here so the kit owns layout & colour. */
  #hud .score { font-size:28px; font-weight:bold; text-shadow:0 1px 4px rgba(0,0,0,0.5); }
  #hud .best  { font-size:12px; color:rgba(255,255,255,0.75); letter-spacing:1px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="gamekit-hud">
  <div class="score" id="scoreEl">0</div>
  <div class="best"  id="bestEl">BEST 0</div>
</div>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $('game'), ctx = canvas.getContext('2d');
  const KIT = window.gamekit;

  // roundRect polyfill for Safari < 15.4
  if (typeof ctx.roundRect !== 'function') {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      const rx = Array.isArray(r) ? r[0] : (r || 0);
      this.beginPath();
      this.moveTo(x + rx, y);
      this.lineTo(x + w - rx, y); this.quadraticCurveTo(x + w, y, x + w, y + rx);
      this.lineTo(x + w, y + h - rx); this.quadraticCurveTo(x + w, y + h, x + w - rx, y + h);
      this.lineTo(x + rx, y + h); this.quadraticCurveTo(x, y + h, x, y + h - rx);
      this.lineTo(x, y + rx); this.quadraticCurveTo(x, y, x + rx, y);
      this.closePath();
    };
  }

  // ---- Audio (game-kit shared engine + global mute) ----
  const SND = window.gamekit.sound;
  SND.define({
    flap: (c) => { c.voice({ f: 300, slideTo: 620, dur: 0.09, type: 'sine', gain: 0.12, reverb: 0.1 }); c.noiseHit({ dur: 0.05, gain: 0.03, filter: 'highpass', cutoff: 2000 }); },
    score: (c) => { [784, 1047].forEach((f, i) => c.voice({ f, dur: 0.14, type: 'sine', gain: 0.1, reverb: 0.24, t: c.now() + i * 0.07 })); },
    hit: (c) => { c.voice({ f: 220, slideTo: 70, dur: 0.32, type: 'sawtooth', gain: 0.2, filter: 'lowpass', cutoff: 1200, cutoffTo: 200 }); c.noiseHit({ dur: 0.12, gain: 0.12, filter: 'lowpass', cutoff: 600, reverb: 0.15 }); },
  });

  // ---- Constants ----
  const GRAVITY     = 0.28;   // was 0.38 — gentler fall
  const FLAP_VY     = -6.0;   // was -7.2 — softer flap
  const OBS_SPEED_DAY   = 1.9;   // gentle scroll
  const OBS_SPEED_NIGHT = 2.2;   // night: slightly faster for variety
  const OBS_W       = 62;
  const GAP_H       = 240;    // generous gap — forgiving (the default; difficulty shrinks toward GAP_H*0.5)
  const GAP_MIN     = GAP_H * 0.5;  // progressive-difficulty floor: never tighter than half the default gap
  const GAP_RAMP    = 55;     // points to approach the tightest gap (smooth ramp)
  // Speed creep: once the gap is maxed-out (score 55), keep difficulty rising by speeding the
  // scroll up to +SPEED_CREEP, reaching full creep at SPEED_RAMP_END. Keeps long runs from flatlining.
  const SPEED_CREEP     = 0.6;   // day 1.9→2.5, night 2.2→2.8 at full creep
  const SPEED_RAMP_FROM = 55;
  const SPEED_RAMP_TO   = 100;
  const OBS_INTERVAL= 300;    // breathing room between obstacles
  const MAX_GAP_STEP= 150;    // cap vertical change between consecutive gaps so a pair is always reachable
  const BIRD_X      = 90;
  const BIRD_R      = 14;
  const HITBOX_SHRINK = 4;    // was 3 — slightly more forgiving

  // ---- Mode (persisted so it survives reload / the kit Menu button) ----
  const MODE_KEY = 'flappy_mode';
  let mode = (localStorage.getItem(MODE_KEY) === 'night') ? 'night' : 'day'; // 'day' | 'night'
  function saveMode(m) { localStorage.setItem(MODE_KEY, m); }

  // ---- RNG (seedable) ----
  let rngSeed = Date.now();
  function rng() { rngSeed = (rngSeed * 1664525 + 1013904223) & 0xffffffff; return (rngSeed >>> 0) / 0x100000000; }
  function seedRng(s) { rngSeed = s >>> 0; }

  // ---- State ----
  let W, H;
  let topInset = 48; // headroom reserved for the center-top kit HUD (see resize)
  let state = 'ready'; // ready | playing | over
  let score = 0;
  let obsSpeed = OBS_SPEED_DAY;

  // ---- Best (single — shared across Day & Night; lives in the shared kit store, one source of truth) ----
  function getBest() { return KIT ? KIT.bestScore('flappy', '') : 0; }
  function saveBest(v) { if (KIT) KIT.saveBest('flappy', '', { score: v }); }
  let best = getBest();

  // ---- Cash + bird unlocks ----
  // Score is treated as cash the player banks across runs; cash unlocks more birds.
  const CASH_KEY = 'flappy_cash';
  function getCash() { return parseInt(localStorage.getItem(CASH_KEY) || '0', 10); }
  function addCash(n) { localStorage.setItem(CASH_KEY, getCash() + n); }

  // Each bird: a body colour + emoji label, locked until enough TOTAL banked cash.
  const BIRDS = [
    { id: 'bee',     emoji: '🐝', body: '#f9e040', wing: '#f0c828', cost: 0 },
    { id: 'robin',   emoji: '🐦', body: '#e07850', wing: '#c45e3a', cost: 25 },
    { id: 'bluebird',emoji: '🐤', body: '#5fa8e8', wing: '#3f86c8', cost: 60 },
    { id: 'parrot',  emoji: '🦜', body: '#5fd07a', wing: '#3aa858', cost: 120 },
    { id: 'flamingo',emoji: '🦩', body: '#f57fb0', wing: '#e05f95', cost: 220 },
    { id: 'phoenix', emoji: '🔥', body: '#ff8a3a', wing: '#e85a1a', cost: 400 },
  ];
  const SEL_KEY = 'flappy_bird';
  function birdUnlocked(b) { return getCash() >= b.cost; }
  function getSelectedBird() {
    const id = localStorage.getItem(SEL_KEY) || 'bee';
    const b = BIRDS.find(x => x.id === id) || BIRDS[0];
    return birdUnlocked(b) ? b : BIRDS[0];
  }
  function selectBird(id) {
    const b = BIRDS.find(x => x.id === id);
    if (b && birdUnlocked(b)) { localStorage.setItem(SEL_KEY, id); return true; }
    return false;
  }
  let selectedBird = getSelectedBird();

  let bird = { x: BIRD_X, y: 0, vy: 0, flapAnim: 0, wobble: 0 };
  let obstacles = [];   // { x, gapY, passed }
  let collectibles = []; // { x, y, r, emoji, val, taken }
  let particles = [];   // { x, y, vx, vy, life, col }
  let stars = [];       // night mode stars
  let fireflies = [];   // night mode fireflies
  let leaves = [];      // day mode wind-blown leaves
  const LEAF_COLS = ['#8fce5a', '#b0dc80', '#e0b25a', '#c8e08a']; // shared by the menu backdrop + in-game
  let nextObsX = 0;
  let pendingGapY = null;
  let lastGapY = null;   // previous obstacle's gap top, for the reachability clamp
  let frame = 0;

  // ---- Parallax layers ----
  let cloudScroll = 0, hillScroll = 0;
  const clouds = [];
  const hills = [];

  function initParallax() {
    clouds.length = 0;
    hills.length = 0;
    stars.length = 0;
    fireflies.length = 0;
    for (let i = 0; i < 5; i++) clouds.push({ x: (i / 5) * W + rng() * W * 0.3, y: H * (0.05 + rng() * 0.18), r: 28 + rng() * 32, s: 0.35 + rng() * 0.25 });
    for (let i = 0; i < 4; i++) hills.push({ x: (i / 4) * W + rng() * W * 0.4, r: W * (0.18 + rng() * 0.14), s: 0.55 + rng() * 0.35 });
    for (let i = 0; i < 60; i++) stars.push({ x: rng() * W, y: rng() * H * 0.65, r: 0.8 + rng() * 1.8, twinkle: rng() * Math.PI * 2 });
    for (let i = 0; i < 14; i++) fireflies.push({ x: rng() * W, y: H * 0.3 + rng() * H * 0.45, phase: rng() * Math.PI * 2, speed: 0.4 + rng() * 0.8, amp: 20 + rng() * 40 });
    leaves.length = 0;
    for (let i = 0; i < 10; i++) leaves.push({ x: rng() * W, y: H * 0.15 + rng() * H * 0.5, r: 4 + rng() * 2.5, spin: rng() * 6.28, spinV: (rng() - 0.5) * 0.06, sway: rng() * 6.28, speed: 0.5 + rng() * 0.8, col: LEAF_COLS[i % 4] });
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Reserve headroom so the playfield clears the center-top HUD. The kit drops the HUD to
    // top:50px on narrow/portrait screens (CSS max-width:560px), so reserve more there.
    topInset = (W <= 560) ? 92 : 48;
    bird.y = startY();
    initParallax();
  }
  window.gamekit.layout.on(resize); // resize + orientationchange + visualViewport, debounced

  // Bird spawns at the center of the playable band (below the HUD headroom, above the ground).
  function startY() { const groundH = 28; return topInset + (H - groundH - topInset) * 0.5; }

  // ---- Init ----
  function resetGame() {
    score = 0;
    frame = 0;
    bird.y = startY();
    bird.vy = 0;
    bird.flapAnim = 0;
    bird.wobble = 0;
    obstacles = [];
    collectibles = [];
    particles = [];
    pendingGapY = null;
    lastGapY = null;
    obsSpeed = mode === 'night' ? OBS_SPEED_NIGHT : OBS_SPEED_DAY;
    best = getBest();
    selectedBird = getSelectedBird();
    seedRng(Date.now());
    // wide screens (landscape/desktop): pre-fill pipes from a fair fixed distance so the run
    // doesn't open with a long empty flight to the far screen edge; on portrait the first slot
    // is already past the edge, so nothing changes
    for (let px = BIRD_X + 520; px <= W; px += OBS_W + OBS_INTERVAL) spawnObstacle(px);
    updateHud();
  }

  function startGame() {
    resetGame();
    state = 'playing';
    if (KIT) { KIT.menu.hide(); KIT.showMenuButton(true); KIT.showPauseButton(true); }
  }

  // ---- shared menus (gamekit.menu) — meadow theme that re-skins day ↔ night, bird GRID picker ----
  const FLAPPY = {
    day:   { accent: '#2f8a2a', glow: '0 0 18px rgba(47,138,42,0.4)', bg: 'rgba(226,244,236,0.82)', overlay: 'rgba(150,205,230,0.5)', text: '#12351f', title: '#1f5a2a', border: 'rgba(30,90,40,0.35)', 'on-accent': '#eafbe6', 'accent-soft': 'rgba(47,138,42,0.16)', scrim: 'rgba(255,255,255,0.26)' },
    night: { accent: '#7ec850', glow: '0 0 18px rgba(126,200,80,0.4)', bg: 'rgba(12,22,30,0.78)', overlay: 'rgba(6,12,18,0.82)', text: '#dfeefa', title: '#a8e878', border: 'rgba(126,200,80,0.3)', 'on-accent': '#0a140a', 'accent-soft': 'rgba(126,200,80,0.16)', scrim: 'rgba(8,16,24,0.34)' },
  };
  function setVars(el, obj) { if (!el || !el.style || !el.style.setProperty) return; for (const k in obj) if (obj[k] != null) { try { el.style.setProperty('--gkm-' + k, obj[k]); } catch (e) {} } }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function mGrad(g, w, h, stops) { const lg = g.createLinearGradient(0, 0, 0, h); stops.forEach(s => lg.addColorStop(s[0], s[1])); g.fillStyle = lg; g.fillRect(0, 0, w, h); }
  function menuBackdrop(g, w, h, tod, frame) {
    frame = frame || 0;
    const night = tod === 'night';
    const rnd = n => { const s = Math.sin(n * 12.9898) * 43758.5453; return s - Math.floor(s); }; // stable per-index scatter
    if (night) { mGrad(g, w, h, [[0, '#0a0e1e'], [.55, '#1a2040'], [1, '#1a3020']]);
      g.fillStyle = '#fff'; for (let s = 0; s < 50; s++) { g.globalAlpha = .5; g.fillRect((s * 97 + 13) % w, (s * 53 + 7) % (h * .7), (s % 3) ? 1.5 : 2.3, (s % 3) ? 1.5 : 2.3); } g.globalAlpha = 1;
      g.fillStyle = 'rgba(240,235,200,.9)'; g.beginPath(); g.arc(w * .82, h * .16, 22, 0, 7); g.fill(); g.fillStyle = 'rgba(30,40,80,.35)'; g.beginPath(); g.arc(w * .82 + 9, h * .16 - 7, 22, 0, 7); g.fill();
    } else { mGrad(g, w, h, [[0, '#c8eeff'], [1, '#e8f8d0']]);
      g.fillStyle = 'rgba(255,255,255,.82)'; [[w * .25, h * .2, 26], [w * .6, h * .12, 20], [w * .85, h * .28, 22]].forEach(c => { g.beginPath(); g.arc(c[0], c[1], c[2], 0, 7); g.arc(c[0] + c[2] * .8, c[1] + 3, c[2] * .7, 0, 7); g.arc(c[0] - c[2] * .8, c[1] + 4, c[2] * .6, 0, 7); g.fill(); });
    }
    const hills = night ? ['#101830', '#0c1428', '#141c34'] : ['#a8d870', '#90cc60', '#b0dc80'], hy = [h * .62, h * .68, h * .72], hr = [w * .28, w * .22, w * .32];
    for (let k = 0; k < 3; k++) { g.fillStyle = hills[k]; for (let hx = -hr[k]; hx < w + hr[k]; hx += hr[k] * 1.4) { g.beginPath(); g.arc(hx + k * 40, hy[k] + hr[k], hr[k], Math.PI, 0); g.fill(); } }
    g.fillStyle = night ? '#0e1a10' : '#7ec850'; g.fillRect(0, h - 28, w, 28); g.fillStyle = night ? '#162010' : '#5a9e30'; g.fillRect(0, h - 28, w, 5);
    const pipes = [w * .22, w * .62], pw = 52;
    pipes.forEach((px, idx) => { const gy = h * .42 + idx * 30, gap = 104;
      const pg = g.createLinearGradient(px, 0, px + pw, 0); if (night) { pg.addColorStop(0, '#2a4060'); pg.addColorStop(.5, '#3a5880'); pg.addColorStop(1, '#1a2840'); } else { pg.addColorStop(0, '#7ec850'); pg.addColorStop(.5, '#9ed870'); pg.addColorStop(1, '#5a9e30'); }
      g.fillStyle = pg; g.fillRect(px, 0, pw, gy - gap / 2); g.fillRect(px, gy + gap / 2, pw, h - (gy + gap / 2) - 28); g.fillRect(px - 5, gy - gap / 2 - 14, pw + 10, 14); g.fillRect(px - 5, gy + gap / 2, pw + 10, 14);
      [gy - gap / 2, gy + gap / 2].forEach(fy => { g.fillStyle = night ? '#a080e0' : '#f9c0c0'; for (let p = 0; p < 5; p++) { const an = p / 5 * 6.28; g.beginPath(); g.ellipse(px + pw / 2 + Math.cos(an) * 11, fy + Math.sin(an) * 9, 5, 4, an, 0, 7); g.fill(); } g.fillStyle = night ? '#c0a0ff' : '#f9e080'; g.beginPath(); g.arc(px + pw / 2, fy, 4, 0, 7); g.fill(); });
    });
    if (night) { // fireflies — mirror the in-game look/behaviour (see drawFireflies): scattered start
      for (let f = 0; f < 14; f++) {          // random x/y, slow left drift, gentle bob, slow pulse, same colours
        const phase = rnd(f + 3.1) * 6.283, amp = 20 + rnd(f + 5.7) * 20;
        const baseX = rnd(f + 1) * (w + 40), baseY = h * 0.3 + rnd(f + 7.3) * h * 0.45;
        const fx = ((baseX - frame * 0.7) % (w + 40) + (w + 40)) % (w + 40) - 20;
        const fy = baseY + Math.sin(frame * 0.02 + phase) * amp * 0.3;
        const glow = 0.5 + 0.5 * Math.sin(frame * 0.07 + phase);
        g.fillStyle = 'rgba(208,255,96,' + (0.3 + 0.7 * glow).toFixed(3) + ')'; g.beginPath(); g.arc(fx, fy, 2.5, 0, 7); g.fill();
        g.fillStyle = 'rgba(192,255,64,' + (0.12 * glow).toFixed(3) + ')'; g.beginPath(); g.arc(fx, fy, 8, 0, 7); g.fill();
      }
    } else { // leaves on the wind — mirror in-game drawLeaves: scattered, varied size/spin/drift + sway bob
      for (let l = 0; l < 10; l++) {
        const speed = 1.1 + rnd(l + 2.2) * 1.7, r = 4 + rnd(l + 6.6) * 2.5;
        const baseX = rnd(l + 1) * (w + 30), baseY = h * 0.15 + rnd(l + 4.4) * h * 0.5;
        const spin = rnd(l + 3.3) * 6.283 + frame * ((rnd(l + 5.5) - 0.5) * 0.06);
        const lx = ((baseX - frame * speed) % (w + 30) + (w + 30)) % (w + 30) - 15;
        const ly = baseY + Math.sin(frame * 0.03 + rnd(l + 8.8) * 6.283) * 10;
        g.save(); g.translate(lx, ly); g.rotate(spin); g.globalAlpha = 0.8;
        g.fillStyle = LEAF_COLS[l % 4]; g.beginPath(); g.ellipse(0, 0, r + 2, r - 1, 0, 0, 7); g.fill();
        g.restore(); g.globalAlpha = 1;
      }
    }
    g.font = '30px system-ui'; g.textAlign = 'center'; g.textBaseline = 'middle'; g.fillText(selectedBird.emoji, w * .4, h * .44);
  }
  let flappyHandle = null;
  function showStartMenu() {
    state = 'ready'; if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    flappyHandle = KIT.menu.show({ kind: 'start', title: '🌸 Meadow Flyer', theme: FLAPPY[mode], backdropAnimate: true,
      backdrop: (g, w, h, st, frame) => menuBackdrop(g, w, h, (st && st.tod) || mode, frame),
      lines: ['Guide the flyer through the flower meadow.'],
      groups: [
        { id: 'tod', label: 'TIME OF DAY', default: mode, choices: [ { id: 'day', label: '☀️ Day' }, { id: 'night', label: '🌙 Night' } ] },
        { id: 'bird', label: 'FLYER', style: 'grid', default: selectedBird.id, choices: BIRDS.map(b => ({
          id: b.id, label: cap(b.id), pvW: 44, pvH: 40,
          preview: g => { g.font = '30px system-ui'; g.textAlign = 'center'; g.textBaseline = 'middle'; g.fillText(b.emoji, 22, 20); },
          locked: () => !birdUnlocked(b), cost: b.cost, sub: b.cost === 0 ? 'Free' : 'Unlocked',
        })) },
      ],
      actions: [{ id: 'play', label: 'Fly!', primary: true }],
      hint: () => 'Best ' + getBest() + ' · 💰 ' + getCash() + ' · tap / click / Space to flap.',
      onChange: st => {
        mode = st.tod === 'night' ? 'night' : 'day'; saveMode(mode);
        if (st.bird && st.bird !== selectedBird.id) { selectBird(st.bird); selectedBird = getSelectedBird(); }
        if (flappyHandle) setVars(flappyHandle.el, FLAPPY[mode]);
        KIT.stampUrl({ bird: selectedBird.id, mode: mode });
      },
      onPlay: st => {
        mode = st.tod === 'night' ? 'night' : 'day'; saveMode(mode);
        if (st.bird) { selectBird(st.bird); selectedBird = getSelectedBird(); }
        KIT.stampUrl({ bird: selectedBird.id, mode: mode }); startGame();
      },
    });
    setVars(flappyHandle.el, FLAPPY[mode]);
    KIT.stampUrl({ bird: selectedBird.id, mode: mode });
  }
  function shareMsg() { return KIT.shareText({ verb: 'I flew to', score: score, game: 'Meadow Flyer', emoji: '🐤', mode: selectedBird.emoji + ' ' + cap(selectedBird.id) }); }
  function showEnd(isBest) {
    if (KIT) { KIT.showMenuButton(false); KIT.showPauseButton(false); }
    if (!KIT) return;
    const h = KIT.menu.show({ kind: 'end', title: 'Oh no!', theme: FLAPPY[mode], backdropAnimate: true, backdrop: (g, w, hh, st, frame) => menuBackdrop(g, w, hh, mode, frame),
      score: score, best: getBest(), newBest: isBest,
      share: { slug: 'flappy', accent: '#8fd3a6', icon: '🐤', title: 'Meadow Flyer', message: () => shareMsg(), params: () => ({ bird: selectedBird.id, mode: mode }) },
      record: { slug: 'flappy', mode: '', score: score },
      actions: [ { id: 'again', label: 'FLY AGAIN', primary: true }, { id: 'menu', label: 'MENU' } ],
      onAction: id => { if (id === 'again') startGame(); else if (id === 'menu') toMenu(); } });
    if (h) setVars(h.el, FLAPPY[mode]);
  }
  function pauseGame() { if (state !== 'playing' || !KIT) return; state = 'paused';
    const h = KIT.menu.show({ kind: 'pause', theme: FLAPPY[mode], title: 'PAUSED', lines: ['Score ' + score],
      actions: [ { id: 'resume', label: 'RESUME (ESC)', primary: true }, { id: 'menu', label: 'QUIT TO MENU', danger: true } ],
      onAction: id => { if (id === 'resume') resumeGame(); else if (id === 'menu') toMenu(); }, onEsc: resumeGame });
    if (h) setVars(h.el, FLAPPY[mode]); }
  function resumeGame() { if (state !== 'paused') return; state = 'playing'; if (KIT) KIT.menu.hide(); }
  function toMenu() { if ((state === 'playing' || state === 'paused') && score > getBest()) saveBest(score); if (KIT) KIT.menu.hide(); showStartMenu(); }


  function gameOver() {
    state = 'over';
    SND.play('hit');
    const cur = getBest();
    const improved = score > cur;
    if (improved) saveBest(score);
    best = getBest();
    updateHud();
    showEnd(improved);
  }

  function flap() {
    if (state !== 'playing') return; // start / restart come from the menu's Play
    bird.vy = FLAP_VY;
    bird.flapAnim = 1;
    SND.play('flap');
  }

  function updateHud() {
    $('scoreEl').textContent = score;
    $('bestEl').textContent = 'BEST ' + getBest();
  }

  // Progressive difficulty: gap shrinks smoothly with the current run's score, clamped at
  // GAP_MIN (= 0.5× the default GAP_H). Reaches the floor around GAP_RAMP points.
  function currentGap() {
    const t = Math.min(1, score / GAP_RAMP);
    return GAP_H - (GAP_H - GAP_MIN) * t;
  }

  // Scroll speed: mode base, plus a creep that ramps in over score SPEED_RAMP_FROM→SPEED_RAMP_TO.
  function currentSpeed() {
    const base = mode === 'night' ? OBS_SPEED_NIGHT : OBS_SPEED_DAY;
    const t = Math.max(0, Math.min(1, (score - SPEED_RAMP_FROM) / (SPEED_RAMP_TO - SPEED_RAMP_FROM)));
    return base + SPEED_CREEP * t;
  }

  // ---- Spawn obstacle ----
  function spawnObstacle(atX) {
    const gap = currentGap();
    const margin = H * 0.12;
    const lo = Math.max(margin, topInset), hi = H - margin - gap;
    let gapY;
    if (pendingGapY !== null) { gapY = pendingGapY; }
    else {
      gapY = lo + rng() * (hi - lo);
      // keep consecutive gaps within reach of one another so a pair is never impossible
      if (lastGapY !== null) gapY = Math.max(lastGapY - MAX_GAP_STEP, Math.min(lastGapY + MAX_GAP_STEP, gapY));
      gapY = Math.max(lo, Math.min(hi, gapY));
    }
    pendingGapY = null;
    lastGapY = gapY;
    const px = (atX != null) ? atX : W + OBS_W;
    obstacles.push({ x: px, gapY, gap, passed: false });
    maybeSpawnCollectible(gapY, gap, px);
  }

  // ---- Collectibles (coins / fruit between pipes) ----
  const COLLECTIBLES = [
    { emoji: '🪙', val: 2 },
    { emoji: '🍒', val: 3 },
    { emoji: '🍓', val: 3 },
    { emoji: '⭐', val: 5 },
  ];
  function maybeSpawnCollectible(gapY, gap, pipeX) {
    if (rng() > 0.55) return; // only some gaps carry a treat
    const c = COLLECTIBLES[(rng() * COLLECTIBLES.length) | 0];
    // place it between this pipe and the next, vertically within the gap
    const y = gapY + 18 + rng() * Math.max(10, gap - 36);
    collectibles.push({ x: (pipeX != null ? pipeX : W + OBS_W) + OBS_INTERVAL * 0.5, y, r: 14, emoji: c.emoji, val: c.val, taken: false });
  }
  function collectAt(idx) {
    const c = collectibles[idx];
    if (!c || c.taken) return;
    c.taken = true;
    score += c.val;
    addCash(c.val);
    updateHud();
    SND.play('score');
    spawnPass(c.x, c.y);
    collectibles.splice(idx, 1);
  }

  // ---- Particles ----
  function spawnPass(x, y) {
    const cols = ['#f9c0c0', '#fae680', '#c8f0b0', '#c0d8f8', '#f8c8f8'];
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      particles.push({ x, y, vx: Math.cos(a) * (1.5 + Math.random() * 2.5), vy: Math.sin(a) * (1.5 + Math.random() * 2.5) - 1.5, life: 1, col: cols[i % cols.length] });
    }
  }

  // ---- Update ----
  function update() {
    frame++;
    if (state !== 'playing') return;

    obsSpeed = currentSpeed();

    // bird physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.flapAnim = Math.max(0, bird.flapAnim - 0.08);
    bird.wobble = Math.sin(frame * 0.18) * 0.04;

    // boundary — ceiling sits below the HUD headroom; ground check uses groundH
    const groundH = 28;
    if (bird.y - BIRD_R <= topInset || bird.y + BIRD_R >= H - groundH) { gameOver(); return; }

    // spawn obstacles
    if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < W - OBS_INTERVAL + OBS_W) {
      if (frame >= 60) spawnObstacle();
    }

    // move obstacles + collision + scoring
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= obsSpeed;
      if (o.x + OBS_W < 0) { obstacles.splice(i, 1); continue; }

      const bx = bird.x, by = bird.y, br = BIRD_R - HITBOX_SHRINK;
      const stemX = o.x + 6, stemW = OBS_W - 12;
      const inX = bx + br > stemX && bx - br < stemX + stemW;
      const inGap = by - br > o.gapY && by + br < o.gapY + o.gap;
      if (inX && !inGap) { gameOver(); return; }

      if (!o.passed && o.x + OBS_W < bird.x - BIRD_R) {
        o.passed = true;
        score++;
        addCash(1);
        updateHud();
        SND.play('score');
        spawnPass(bird.x + 20, bird.y);
      }
    }

    // collectibles: move, collect on overlap, cull off-screen
    for (let i = collectibles.length - 1; i >= 0; i--) {
      const c = collectibles[i];
      c.x -= obsSpeed;
      if (c.x + c.r < 0) { collectibles.splice(i, 1); continue; }
      const dx = c.x - bird.x, dy = c.y - bird.y;
      if (dx * dx + dy * dy < (c.r + BIRD_R) * (c.r + BIRD_R)) { collectAt(i); }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.07; p.life -= 0.035;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // parallax scroll
    cloudScroll += 0.28;
    hillScroll += 0.55;

    // firefly drift
    for (const f of fireflies) {
      f.x -= obsSpeed * 0.3;
      if (f.x < -10) f.x = W + 10;
    }
    // leaf drift (day)
    for (const l of leaves) {
      l.x -= obsSpeed * l.speed; l.spin += l.spinV; l.sway += 0.03;
      if (l.x < -12) { l.x = W + 12; l.y = H * 0.15 + rng() * H * 0.5; }
    }
  }

  // ---- Render helpers ----
  function drawCloud(x, y, r) {
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + r * 0.75, y + r * 0.2, r * 0.68, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x - r * 0.65, y + r * 0.25, r * 0.6, 0, Math.PI * 2); ctx.fill();
  }

  function drawHill(x, r, col) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x, H, r, 0, Math.PI, true); ctx.closePath(); ctx.fill();
  }

  function drawStars() {
    for (const s of stars) {
      const tw = 0.5 + 0.5 * Math.sin(frame * 0.04 + s.twinkle);
      ctx.globalAlpha = 0.4 + 0.6 * tw;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawLeaves() {
    for (const l of leaves) {
      const y = l.y + Math.sin(l.sway) * 10;
      ctx.save(); ctx.translate(l.x, y); ctx.rotate(l.spin); ctx.globalAlpha = 0.8;
      ctx.fillStyle = l.col; ctx.beginPath(); ctx.ellipse(0, 0, l.r + 2, l.r - 1, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawFireflies() {
    for (const f of fireflies) {
      const glow = 0.5 + 0.5 * Math.sin(frame * 0.07 + f.phase);
      const fy = f.y + Math.sin(frame * 0.02 + f.phase) * f.amp * 0.3;
      ctx.globalAlpha = 0.3 + 0.7 * glow;
      ctx.fillStyle = '#d0ff60';
      ctx.beginPath(); ctx.arc(f.x, fy, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.12 * glow;
      ctx.fillStyle = '#c0ff40';
      ctx.beginPath(); ctx.arc(f.x, fy, 8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawObstacle(o) {
    const topH = o.gapY;
    const botY = o.gapY + (o.gap || GAP_H);
    const botH = H - botY;

    let grad, petalCol, centerCol;
    if (mode === 'night') {
      grad = ctx.createLinearGradient(o.x, 0, o.x + OBS_W, 0);
      grad.addColorStop(0, '#2a4060');
      grad.addColorStop(0.5, '#3a5880');
      grad.addColorStop(1, '#1a2840');
      petalCol = '#a080e0';
      centerCol = '#c0a0ff';
    } else {
      grad = ctx.createLinearGradient(o.x, 0, o.x + OBS_W, 0);
      grad.addColorStop(0, '#7ec850');
      grad.addColorStop(0.5, '#9ed870');
      grad.addColorStop(1, '#5a9e30');
      petalCol = '#f9c0c0';
      centerCol = '#f9e080';
    }

    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(o.x + 6, 0, OBS_W - 12, topH - 6, [0, 0, 8, 8]); ctx.fill();
    ctx.fillStyle = petalCol;
    for (let a = 0; a < 5; a++) {
      const ang = (a / 5) * Math.PI * 2;
      ctx.beginPath(); ctx.ellipse(o.x + OBS_W / 2 + Math.cos(ang) * 14, topH - 8 + Math.sin(ang) * 10, 10, 8, ang, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = centerCol;
    ctx.beginPath(); ctx.arc(o.x + OBS_W / 2, topH - 8, 10, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(o.x + 6, botY + 6, OBS_W - 12, botH - 6, [8, 8, 0, 0]); ctx.fill();
    ctx.fillStyle = petalCol;
    for (let a = 0; a < 5; a++) {
      const ang = (a / 5) * Math.PI * 2;
      ctx.beginPath(); ctx.ellipse(o.x + OBS_W / 2 + Math.cos(ang) * 14, botY + 8 + Math.sin(ang) * 10, 10, 8, ang, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = centerCol;
    ctx.beginPath(); ctx.arc(o.x + OBS_W / 2, botY + 8, 10, 0, Math.PI * 2); ctx.fill();
  }

  function drawBird() {
    const x = bird.x, y = bird.y;
    const angle = Math.max(-0.5, Math.min(1.0, bird.vy * 0.07)) + bird.wobble;
    const flapOff = bird.flapAnim * 5;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.fillStyle = selectedBird.body;
    ctx.beginPath(); ctx.ellipse(0, 0, BIRD_R, BIRD_R * 0.8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = selectedBird.wing;
    ctx.beginPath(); ctx.ellipse(-4, -flapOff - 4, 10, 6, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-4,  flapOff + 4, 10, 6,  0.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a2a17';
    ctx.beginPath(); ctx.arc(BIRD_R * 0.55, -2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(BIRD_R * 0.55 + 1, -3, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e07030';
    ctx.beginPath(); ctx.moveTo(BIRD_R * 0.8, -1); ctx.lineTo(BIRD_R * 1.22, 1); ctx.lineTo(BIRD_R * 0.8, 3); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#8a6020'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-2, -BIRD_R * 0.7); ctx.quadraticCurveTo(-8, -BIRD_R * 1.3, -12, -BIRD_R * 1.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4, -BIRD_R * 0.7); ctx.quadraticCurveTo(8, -BIRD_R * 1.3, 11, -BIRD_R * 1.5); ctx.stroke();
    ctx.fillStyle = '#f9c080';
    ctx.beginPath(); ctx.arc(-12, -BIRD_R * 1.5, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(11, -BIRD_R * 1.5, 2.5, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  function render() {
    if (mode === 'night') {
      // Night sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#0a0e1e');
      skyGrad.addColorStop(0.6, '#1a2040');
      skyGrad.addColorStop(1, '#1a3020');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      drawStars();

      // moon
      ctx.fillStyle = 'rgba(240,235,200,0.90)';
      ctx.beginPath(); ctx.arc(W * 0.82, H * 0.12, 28, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(30,40,80,0.35)';
      ctx.beginPath(); ctx.arc(W * 0.82 + 10, H * 0.12 - 8, 22, 0, Math.PI * 2); ctx.fill();

      // night hills
      drawHill(((120 - hillScroll * 0.45) % (W + 300) + W + 300) % (W + 300) - 150, W * 0.28, '#101830');
      drawHill(((W * 0.55 - hillScroll * 0.6) % (W + 300) + W + 300) % (W + 300) - 150, W * 0.22, '#0c1428');
      drawHill(((W * 0.8 - hillScroll * 0.5) % (W + 300) + W + 300) % (W + 300) - 150, W * 0.32, '#141c34');

      // ground
      const groundH = 28;
      ctx.fillStyle = '#0e1a10';
      ctx.fillRect(0, H - groundH, W, groundH);
      ctx.fillStyle = '#162010';
      ctx.fillRect(0, H - groundH, W, 5);

      for (const o of obstacles) drawObstacle(o);

      drawFireflies();
    } else {
      // Day sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#c8eeff');
      skyGrad.addColorStop(1, '#e8f8d0');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // clouds
      for (const c of clouds) {
        const cx = ((c.x - cloudScroll * c.s) % (W + 120) + W + 120) % (W + 120) - 60;
        drawCloud(cx, c.y, c.r);
      }

      // hills
      drawHill(((120 - hillScroll * 0.45) % (W + 300) + W + 300) % (W + 300) - 150, W * 0.28, '#a8d870');
      drawHill(((W * 0.55 - hillScroll * 0.6) % (W + 300) + W + 300) % (W + 300) - 150, W * 0.22, '#90cc60');
      drawHill(((W * 0.8 - hillScroll * 0.5) % (W + 300) + W + 300) % (W + 300) - 150, W * 0.32, '#b0dc80');

      // ground
      const groundH = 28;
      ctx.fillStyle = '#7ec850';
      ctx.fillRect(0, H - groundH, W, groundH);
      ctx.fillStyle = '#5a9e30';
      ctx.fillRect(0, H - groundH, W, 5);

      drawLeaves();
      for (const o of obstacles) drawObstacle(o);
    }

    // collectibles (both modes) — emoji-as-text with a soft glow
    if (collectibles.length) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '24px serif';
      for (const c of collectibles) {
        const pulse = 1 + 0.08 * Math.sin(frame * 0.12 + c.x * 0.05);
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = mode === 'night' ? '#fff7c0' : '#fff3b0';
        ctx.beginPath(); ctx.arc(c.x, c.y, c.r * 1.4 * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillText(c.emoji, c.x, c.y);
      }
    }

    // particles (both modes)
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawBird();
  }

  // ---- Input ----
  canvas.addEventListener('pointerdown', () => flap());
  document.addEventListener('keydown', e => {
    if ((e.key === ' ' || e.key === 'Enter') && state === 'playing') { e.preventDefault(); flap(); }
    else if (e.key === 'Escape' && state === 'playing') { e.preventDefault(); pauseGame(); }
  });

  // ---- top nav (game-kit) ----
  KIT.nav({ music: true, reset: 'flappy_', home: '../../', theme: FLAPPY.day, challenges: 'flappy', onMenu: () => toMenu(),
    onPause: () => { if (state === 'playing') pauseGame(); else if (state === 'paused') resumeGame(); },
    confirmLeave: () => (state === 'playing' || state === 'paused') ? "Leave this run? You'll lose your progress." : false,
    controls: { title: 'Meadow Flyer — Controls',
      mouse: [ ['Click', 'Flap'] ], keyboard: [ ['Space · Enter', 'Flap'], ['Esc', 'Pause'] ], touch: [ ['Tap', 'Flap'] ] } });
  KIT.music.play('meadow');

  // ---- Test hook ----
  window.__test = {
    get state() { return state; },
    get score() { return score; },
    get bird()  { return { x: bird.x, y: bird.y, vy: bird.vy }; },
    get nextGap() { return obstacles.length > 0 ? obstacles.find(o => !o.passed) : null; },
    get obstacles() { return obstacles; },
    // JS-computed layout snapshot (canvas/px space) for layout-regression tests.
    get layout() {
      const groundH = 28;
      const groundY = H - groundH;            // top edge of the ground strip
      const o = obstacles.find(x => !x.passed) || obstacles[0] || null;
      return {
        W, H,
        topReserve: topInset,                 // headroom the playfield clears for the center-top HUD
        groundY,
        bird: {
          x: bird.x, y: bird.y, r: BIRD_R,
          left: bird.x - BIRD_R, right: bird.x + BIRD_R,
          top: bird.y - BIRD_R, bottom: bird.y + BIRD_R,
        },
        // Vertical band the bird can occupy (ceiling..floor used by the collision check).
        playTop: topInset,
        playBottom: groundY,
        // Nearest pipe gap (null until one spawns). gapTop/gapBottom are the gap's vertical extent.
        gap: o ? { x: o.x, gapTop: o.gapY, gapBottom: o.gapY + o.gap } : null,
      };
    },
    get best() { return getBest(); },
    get mode() { return mode; },
    get GAP_H() { return GAP_H; },
    get GAP_MIN() { return GAP_MIN; },
    get GRAVITY() { return GRAVITY; },
    get OBS_INTERVAL() { return OBS_INTERVAL; },
    get cash() { return getCash(); },
    get collectibles() { return collectibles; },
    get birds() { return BIRDS.map(b => ({ id: b.id, cost: b.cost, unlocked: birdUnlocked(b) })); },
    get selectedBird() { return getSelectedBird().id; },
    currentGap() { return currentGap(); },
    currentSpeed() { return currentSpeed(); },
    get obsSpeed() { return obsSpeed; },
    menu() { return KIT ? KIT.menu.current() : null; },
    start() { mode = 'day'; startGame(); },
    startMode(m) { mode = (m === 'night' ? 'night' : 'day'); startGame(); },
    flap: () => { if (state === 'playing') { bird.vy = FLAP_VY; bird.flapAnim = 1; } },
    step(n) { for (let i = 0; i < (n || 1); i++) update(); },
    seed: seedRng,
    spawnGapAt(y) { pendingGapY = y; },
    setBest(v) { saveBest(v); best = v; },
    setCash(v) { localStorage.setItem(CASH_KEY, String(v)); },
    selectBird(id) { const r = selectBird(id); selectedBird = getSelectedBird(); return r; },
    // Drop a collectible directly in front of the bird for headless collect tests.
    spawnCollectibleAt(x, y, val) { collectibles.push({ x: x, y: y, r: 14, emoji: '🪙', val: val || 2, taken: false }); },
    setScore(v) { score = v; updateHud(); },
  };

  resize(); updateHud(); KIT.loop(update, render);
  // deep-link ?bird= / ?mode= → preselect before opening the menu
  { const P = KIT && KIT.param; if (P) { const pb = P('bird'); if (pb && BIRDS.some(b => b.id === pb) && selectBird(pb)) selectedBird = getSelectedBird(); const pm = P('mode'); if (pm === 'day' || pm === 'night') { mode = pm; saveMode(mode); } } }
  showStartMenu(); // open the shared start menu (bird/day-night preselected from the URL)
})();
  window.gamekit.pwa();
</script>
</body>
</html>
